<body class="bg-background text-on-surface">

<button class="bg-white/90 p-2 rounded-full text-primary"><span class="material-symbols-outlined">visibility</span></button>

<div class="aspect-square rounded-xl border-2 border-dashed border-outline-variant bg-surface-container flex flex-col items-center justify-center text-on-surface-variant cursor-pointer hover:bg-surface-variant transition-colors">

<span class="text-xs font-semibold">Upload More</span>
</div>
</div>

</div>
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2" for="notes">Audit Notes</label>
<textarea class="w-full px-4 py-3 bg-surface-container-lowest border-none rounded-lg ring-1 ring-outline-variant/15 focus:ring-primary focus:ring-2 transition-all outline-none resize-none" id="notes" placeholder="Enter detailed observations here..." rows="4">Signage alignment is slightly off-center on the second shelf. Recommended adjustment during next stocking cycle.</textarea>
</div>
</section>
<!-- Section: Toggles -->
<section class="mt-8 pt-8 border-t border-surface-container-high space-y-4">
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl">

<span class="text-xs text-on-surface-variant">Flag this section for a manager follow-up</span>

<span class="text-xs text-on-surface-variant">Mark if major layout shifts occurred</span>
</div>

<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
